<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyCareer</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script>
  const savedLang = localStorage.getItem("lang") || "ru";
  const savedMode = localStorage.getItem("mode") || "job";

  document.documentElement.setAttribute("data-lang", savedLang);
  document.documentElement.setAttribute("data-mode", savedMode);
</script>
</head>

<body>

<div class="bg-glow"></div>

<header class="header">
  <div class="logo">MyCareer</div>

  <!-- LANG SWITCH -->
  <div class="lang-switch">
    <div class="lang-option active" data-lang="ru">RU</div>
    <div class="lang-option" data-lang="az">AZ</div>
    <div class="lang-indicator"></div>
  </div>
</header>

<section class="hero">

  <!-- MODE SWITCH -->
  <div class="mode-switch">
    <div class="mode-option active" data-mode="job">MyCareer</div>
    <div class="mode-option" data-mode="hire">Ищу сотрудника</div>
    <div class="mode-indicator"></div>
  </div>

  <h1 id="title">Найдите работу быстрее, чем откликнетесь</h1>
  <p id="subtitle">Умный поиск вакансий для тех, кто ценит время</p>

  <div class="search">
    <input id="input1" placeholder="Должность">
    <input id="input2" placeholder="Город">
    <button id="btn">Найти работу</button>
  </div>

  <div class="jobs">
    <div class="card">
      <h3>Frontend Developer</h3>
      <p>Удаленно • 150 000 ₽</p>
    </div>
    <div class="card">
      <h3>Product Designer</h3>
      <p>Баку • 2200 AZN</p>
    </div>
  </div>

</section>

<script src="script.js"></script>

</body>
</html>
